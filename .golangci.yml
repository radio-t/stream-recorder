version: "2"

run:
  concurrency: 4
  timeout: 10m

linters:
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - copyloopvar
    - exhaustive
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - goheader
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nestif
    - noctx
    - nolintlint
    - prealloc
    - rowserrcheck
    - staticcheck
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - whitespace
    - exhaustruct
    - tagliatelle
    - revive

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - whyNoLint

    gocyclo:
      min-complexity: 10

    tagliatelle:
      case:
        rules:
          json: snake

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - exhaustruct
    paths:
      - vendor
      - '.*moq_test\.go$'

formatters:
  enable:
    - gci
    - gofmt

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/radio-t/stream-recorder)
        - blank
        - dot
      custom-order: true
