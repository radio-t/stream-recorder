services:
  streamrecorder:
    build: .
    container_name: streamrecorder

    ports:
    - 8098:8080

    volumes:
    - ./records:/records

    environment:
      - PORT=8080
      - DIR=/records
      - DBG=true
      - TZ=UTC
      - SCHEDULE=true
      #- RETENTION_DAYS=30
      #- NEWS_API=https://news.radio-t.com/api/v1
      #- AUTH_PASSWD=$$2y$$10$$... # bcrypt hash for POST /record auth (use $$ to escape $ in compose)
