<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>
  <body>
    <table>
    <tr>
      <th>Episode number</th>
      <th>Files</th>
    </tr>
      {{range .Episodes}}
        <tr>
          <td colspan="2"><a href="/episode/{{ .Name }}">{{ .Name }}</a></td>
        </tr>
        {{range .Files}}
          <tr><td></td><td>{{ . }}</td></tr>
        {{end}}
      {{else}}
        <tr>
          <td colspan="2"><strong>no rows</strong></td>
        </tr>
      {{end}}
    </table>
  </body>
</html>
